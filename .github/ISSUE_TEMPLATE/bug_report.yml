name: Bug report
description: Something is broken or behaves unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the form so it's reproducible.

  - type: input
    id: orekas-version
    attributes:
      label: Orekas version
      description: e.g. v0.1.0, or the commit SHA from a dev build.
      placeholder: v0.1.0
    validations:
      required: true

  - type: input
    id: meteor-version
    attributes:
      label: Meteor Client version
      placeholder: 1.21.11-SNAPSHOT
    validations:
      required: true

  - type: input
    id: minecraft-version
    attributes:
      label: Minecraft version
      placeholder: 1.21.11
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: Java version
      placeholder: Temurin 21.0.4
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do, in order, that triggered the bug?
      placeholder: |
        1. Enable OreFinder
        2. Travel to ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste the relevant section of `logs/latest.log`. Stack traces are especially useful.
      render: text
