name: Feature request
description: Suggest a new feature or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: feature
    attributes:
      label: What would you like to see?
      description: Describe the feature or improvement.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why does it matter?
      description: What problem does it solve, or what use case does it unlock?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Workarounds, other addons, settings tweaks, etc.
